    <!-- FORM ĐĂNG KÝ -->
    <section class="login-page">
      <div class="wrapper">
        <h2>Register</h2>

        <form id="registerForm" action="Trangchu.html" method="post">
          <div class="form-group">
            <label>Phone number:</label>
            <div class="dt">
              <i class="fa-solid fa-phone"></i>
              <input type="tel" placeholder="Phone number" required />
            </div>
          </div>

          <div class="form-group">
            <label>Email:</label>
            <div class="mail">
              <i class="fa-solid fa-envelope"></i>
              <input type="email" placeholder="Email" required />
            </div>
          </div>

          <div class="form-group">
            <label>Full name:</label>
            <div class="name">
              <i class="fa-solid fa-user"></i>
              <input type="text" placeholder="Full name" required />
            </div>
          </div>

          <div class="form-group">
            <label>Password:</label>
            <div class="key">
              <i class="fa-solid fa-key"></i>
              <input type="password" placeholder="Password" required />
            </div>
          </div>

          <div class="form-group">
            <label>Confirm password:</label>
            <div class="key">
              <i class="fa-solid fa-key"></i>
              <input type="password" placeholder="Confirm password" required />
            </div>
          </div>

          <div class="terms">
            <input type="checkbox" required />
            <label>I agree to the terms</label>
          </div>

          <div class="form-group">
            <button type="submit">Create account</button>
          </div>

          <p>
            Already have an account?
            <a href="dangnhap.html">Login</a>
          </p>

          <hr />

          <p class="login">Or sign up with</p>

          <div class="social-ground">
            <a href="https://facebook.com" class="social-facebook">
              <i class="fa-brands fa-facebook"></i>
              Facebook
            </a>

            <a href="#" class="social-google">
              <img src="https://www.svgrepo.com/show/475656/google-color.svg" />
              Google
            </a>
          </div>
        </form>
      </div>
    </section>
